<body class="page">
  <header class="header">
    <img
      src="https://practicum-content.s3.us-west-1.amazonaws.com/web-surfer/around/images/logo.svg"
      alt="Logo Around"
      class="header__logo"
    />
  </header>

  <main class="content">
    <section class="profile">
      <img
        src="https://practicum-content.s3.us-west-1.amazonaws.com/web-surfer/around/images/jacques-cousteau.jpg"
        alt="Avatar"
        class="profile__avatar"
      />
      <div class="profile__info">
        <div class="profile__title-wrapper">
          <h1 class="profile__name">Jacques Cousteau</h1>
          <button class="profile__edit-button" type="button"></button>
        </div>
        <p class="profile__description">Explorador oceánico</p>
      </div>
      <button class="profile__add-button" type="button"></button>
    </section>

    <section class="elements">
      <article class="element">
        <img
          src="https://practicum-content.s3.us-west-1.amazonaws.com/web-surfer/around/images/yosemite.jpg"
          alt="Valle de Yosemite"
          class="element__image"
        />
        <div class="element__group">
          <h2 class="element__title">Valle de Yosemite</h2>
          <button class="element__like-button" type="button"></button>
        </div>
      </article>
    </section>
  </main>
</body>
